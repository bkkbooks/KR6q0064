front:
  text: 密菴禪師語錄序密菴禪師示寂之三年其得法真子住靈巖了悟以老師平生語一編屬鎡作序鎡切謂老師一見應菴便明大法破沙盆語盛播叢林此無可序者七鎮名山道滿天下一時龍象盡出鉗鎚此亦無可序者入對中宸闡揚般若深契上意益光宗門此亦無可序者然鎡叨承衣付義不容默謹為之序曰密菴語錄一帙總八十八板板二十行行二十字若於此薦得許親見密菴如或未然聽取一轉語淳熙十五年冬仲月九日參學張鎡序
